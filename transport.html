<style>
.cars-grid{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(260px,1fr));
  gap:20px;
  margin-top:20px;
}

.car-card{
  background:#14141c;
  border-radius:18px;
  overflow:hidden;
  transition:0.25s;
  border:1px solid rgba(255,255,255,0.05);
}

.car-card:hover{
  transform:translateY(-4px);
  border-color:#2d6bff;
}

.car-card img{
  width:100%;
  height:180px;
  object-fit:cover;
  display:block;
}

.car-name{
  padding:14px;
  font-size:18px;
  font-weight:800;
  text-align:center;
}
</style>
</head>

<body>

<div class="nav">
  <div class="nav__inner">
    <div class="brand"><span class="b">GTA</span><span class="y">INE</span> Wiki</div>
    <div class="menu">
      <a href="index.html">Головна</a>
      <a href="orgs/index.html">Держ.орг</a>
      <a href="jobs/index.html">Роботи</a>
      <a class="active" href="transport.html">Транспорт</a>
      <a href="systemy.html">Системи</a>
    </div>
  </div>
</div>

<div class="container">

  <div class="hero">
    <h1>🚗 Транспорт</h1>
    <p>Тільки фото + назва авто.</p>
  </div>

  <div class="cars-grid">

    <div class="car-card">
      <img src="assets/img/bmw.jpg" alt="BMW">
      <div class="car-name">BMW M5 F90</div>
    </div>

    <div class="car-card">
      <img src="assets/img/mercedes.jpg" alt="Mercedes">
      <div class="car-name">Mercedes E63</div>
    </div>

    <div class="car-card">
      <img src="assets/img/porsche.jpg" alt="Porsche">
      <div class="car-name">Porsche 911</div>
    </div>

    <div class="car-card">
      <img src="assets/img/gtr.jpg" alt="GTR">
      <div class="car-name">Nissan GT-R</div>
    </div>

  </div>

</div>
